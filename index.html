<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>V1 - Управление задачами руководителя</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="app-header">
      <h1>Управление задачами руководителя</h1>
      <div class="header-controls">
        <p id="user-badge" class="user-badge"></p>
        <div id="app-messages" class="messages" aria-live="polite"></div>
        <div class="role-switch">
          <label for="role-switch-select">Режим просмотра</label>
          <div class="role-switch-row">
            <select id="role-switch-select"></select>
            <button id="role-switch-btn" type="button">Переключить</button>
          </div>
        </div>
      </div>
    </header>

    <main class="layout">
      <section id="quick-create-screen" class="card hidden">
        <h2>Быстрая постановка задачи</h2>
        <p class="hint">2 действия: записать голос -> отправить задачу.</p>
        <div class="row">
          <button id="record-btn" class="primary" type="button">Записать голос</button>
          <span id="record-status" class="status"></span>
        </div>
        <label for="task-text">Текст задачи</label>
        <textarea id="task-text" rows="3" placeholder="Текст появится после распознавания речи..."></textarea>

        <label for="task-topic">Тема</label>
        <div class="field-row">
          <select id="task-topic" class="field-row-select"></select>
          <button type="button" id="topic-minus" class="icon-btn" title="Удалить выбранную тему" aria-label="Удалить тему">
            −
          </button>
          <button type="button" id="topic-plus" class="icon-btn" title="Добавить тему" aria-label="Добавить тему">+</button>
        </div>
        <input type="text" id="new-topic-input" class="inline-input-below" placeholder="Новая тема — введите и нажмите +" />

        <label for="task-assignee">Исполнитель</label>
        <div class="field-row">
          <select id="task-assignee" class="field-row-select"></select>
          <button type="button" id="performer-minus" class="icon-btn" title="Удалить выбранного исполнителя" aria-label="Удалить исполнителя">
            −
          </button>
          <button type="button" id="performer-plus" class="icon-btn" title="Добавить исполнителя" aria-label="Добавить исполнителя">
            +
          </button>
        </div>
        <input type="text" id="new-performer-input" class="inline-input-below" placeholder="ФИО исполнителя — введите и нажмите +" />
        <p id="assignee-invite-hint" class="invite-hint"></p>

        <button id="send-task-btn" class="primary" type="button">Отправить задачу</button>
      </section>

      <section id="tasks-screen" class="card">
        <h2 id="tasks-title">Задачи</h2>
        <div class="filters">
          <button class="filter-btn active" data-filter="active" type="button">Активные</button>
          <button class="filter-btn" data-filter="completed" type="button">Выполненные</button>
          <button class="filter-btn" data-filter="cancelled" type="button">Отмененные</button>
        </div>
        <ul id="tasks-list" class="tasks-list"></ul>
      </section>

      <section id="task-details-screen" class="card">
        <h2>Детали и история</h2>
        <div id="task-details" class="details empty">Выберите задачу из списка.</div>
      </section>
    </main>

    <template id="task-item-template">
      <li class="task-item">
        <button type="button" class="task-open"></button>
        <span class="task-meta"></span>
      </li>
    </template>

    <script src="app.js"></script>
  </body>
</html>
